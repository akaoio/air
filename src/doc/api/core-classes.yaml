# Core Classes and Their Responsibilities

classes:
    - name: "Peer"
      file: "src/Peer.ts"
      description: "The main class managing the distributed database instance"
      methods:
          core:
              - name: "start()"
                description: "Main initialization"
              - name: "restart()"
                description: "Restart with backoff"
              - name: "init()"
                description: "Server initialization"
              - name: "run()"
                description: "GUN initialization"
              - name: "online()"
                description: "User authentication"
              - name: "sync()"
                description: "Config synchronization"

          ip_methods:
              - name: "ip.get()"
                description: "Get IP address"
                return: "IPResult"
              - name: "ip.validate()"
                description: "Validate IP format"
                return: "boolean"
              - name: "ip.dns()"
                description: "Get IP via DNS"
                return: "string | null"
              - name: "ip.http()"
                description: "Get IP via HTTP"
                return: "string | null"

          status_methods:
              - name: "status.ddns()"
                description: "Update DDNS status"
              - name: "status.ip()"
                description: "Update IP status"
              - name: "status.alive()"
                description: "Send alive signal"

    - name: "ConfigManager"
      file: "src/config.ts"
      description: "Handles configuration with precedence: CLI > ENV > file > defaults"
      methods:
          - name: "read()"
            return: "AirConfig"
          - name: "write()"
            params: "config: AirConfig"
          - name: "merge()"
            params: "...configs: Partial<AirConfig>[]"
            return: "AirConfig"

    - name: "ProcessManager"
      file: "src/process.ts"
      description: "PID file management and port conflict detection"
      methods:
          - name: "checkpid()"
            return: "boolean"
          - name: "cleanpid()"
            return: "void"
          - name: "find()"
            params: "port: number"
            return: "ProcessInfo | null"

    - name: "StatusReporter"
      file: "src/status.ts"
      description: "Status reporting to GUN database"
      methods:
          - name: "start()"
            return: "void"
          - name: "stop()"
            return: "void"
          - name: "alive()"
            return: "void"
          - name: "ip()"
            return: "Promise<void>"
          - name: "ddns()"
            return: "Promise<void>"

    - name: "Network"
      file: "src/network.ts"
      description: "IP detection and DDNS updates"
      methods:
          - name: "get()"
            return: "Promise<IPResult>"
          - name: "validate()"
            params: "ip: string"
            return: "boolean"
          - name: "update()"
            params: "config: AirConfig, ips: IPResult"
            return: "Promise<UpdateResult[]>"
