# Bun configuration
# Favor Bun's native performance over Node.js compatibility

[install]
# Use Bun's lockfile format
lockfile = "bun.lockb"

# Faster installs
concurrent = 16
frozen = false

[install.cache]
# Cache packages for faster reinstalls
disable = false
# Let Bun use its default cache location

[test]
# Test configuration - Single worker to prevent CPU overload
root = "./test"
preload = ["./test/setup.ts"]
coverage = false
coverageThreshold = 0
# Prevent parallel execution for SSH stability
smol = false
timeout = 30000

[run]
# Runtime configuration
# Bun is 4x faster than Node.js
silent = false
bun = true

# Hot reload for development
[debug]
hot = true

# Build configuration
[build]
target = "bun"
outdir = "./dist"
minify = true
sourcemap = "external"
splitting = true
external = ["@akaoio/gun"]

# Bundle for production
[bundle]
format = "esm"
platform = "node"
target = "bun"